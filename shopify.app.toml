# Create a separate app in Shopify Partners and run: shopify app config link
# Update application_url and redirect_urls to your deployed host before production.

client_id = "676afce18622447d5cf9673cae5c4fa0"
name = "Banner Design Preview"
application_url = "https://shopify-banner-app-alpha.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
scopes = "write_products,write_app_proxy,read_orders"
optional_scopes = ["write_draft_orders"]

[app_proxy]
url = "/apps/proxy"
prefix = "apps"
subpath = "banner-preview"

[auth]
redirect_urls = [ "https://shopify-banner-app-alpha.vercel.app/api/auth" ]
