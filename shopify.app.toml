# Create a separate app in Shopify Partners and run: shopify app config link
#
# application_url + [auth] redirect_urls must be YOUR real HTTPS host (e.g. Vercel).
# Also set SHOPIFY_APP_URL in .env / Vercel to the SAME origin (no trailing slash). If SHOPIFY_APP_URL
# is still https://example.com, the admin iframe loads IANA’s placeholder site and shows:
# "This domain is for use in documentation examples…"

client_id = "676afce18622447d5cf9673cae5c4fa0"
name = "Banner Design Preview"
application_url = "https://shopify-banner-app-alpha.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
scopes = "write_products,write_app_proxy,read_orders,write_draft_orders"

[app_proxy]
url = "/apps/proxy"
prefix = "apps"
subpath = "banner-preview"

[auth]
redirect_urls = [
  "https://shopify-banner-app-alpha.vercel.app/auth/callback",
  "https://shopify-banner-app-alpha.vercel.app/auth/shopify/callback",
  "https://shopify-banner-app-alpha.vercel.app/api/auth/callback"
]
